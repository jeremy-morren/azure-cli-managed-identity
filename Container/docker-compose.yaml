services:
  managed-identity:
    build:
      context: ../
      dockerfile: Container/Dockerfile
    volumes:
      - "${USERPROFILE:-~}/.azure:/azureCli:ro"
    cpus: '0.25'
    mem_limit: 16m

  test-api:
    build:
      context: TestApi/
      dockerfile: Dockerfile
    ports:
      - '8081:8080/tcp'
    environment:
      MSI_ENDPOINT: 'http://managed-identity/oauth2/token'
    cpus: '0.5'
    mem_limit: 128m